{% extends 'base.html' %}
{% block title %}Delete Entry — Feelio{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:460px;">
  <div class="feelio-card p-4 text-center">
    <i class="fa-solid fa-trash-can fa-2x mb-3" style="color:var(--primary);"></i>
    <h2 class="mb-2">Delete this entry?</h2>
    <p class="mb-4" style="color:#9C6B8A;">
      "{{ entry.title|default:'Untitled Entry' }}" from {{ entry.created_at|date:"F j, Y" }} will be permanently deleted.
    </p>
    <form method="post" class="d-flex gap-3 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete it</button>
      <a href="{% url 'tracker:journal' %}" class="btn-feelio-outline btn">Keep it</a>
    </form>
  </div>
</div>
{% endblock %}
